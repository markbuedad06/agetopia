<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agetopia</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-shell">
    <header class="hud-top">
      <button id="chatToggleBtn" class="menu-btn chat-toggle" aria-label="Chat">Chat</button>
      <div class="corner-controls">
        <button id="btnFullscreen" class="action-btn fullscreen" aria-label="Fullscreen">⛶</button>
        <div id="onlineState" class="online-state offline">Offline</div>
        <button id="menuBtn" type="button" class="menu-btn">Menu</button>
      </div>
      <div id="authMessage" class="auth-message">Connecting...</div>
      <div id="worldOwnerDisplay" class="world-owner-display hidden"></div>
      <div id="chatHistoryPanel" class="chat-history-panel" role="region" aria-label="World chat history">
        <div class="chat-history-header">
          <span>World Chat</span>
          <div class="chat-history-actions">
            <span class="chat-history-window">Last 1 hr</span>
            <button id="chatHistoryToggle" type="button" class="chat-history-toggle" aria-expanded="true" aria-label="Toggle world chat panel">Close</button>
          </div>
        </div>
        <div id="chatHistoryList" class="chat-history-list" role="log" aria-live="polite"></div>
      </div>
    </header>

    <div id="chatBar" class="chat-bar hidden" role="form" aria-label="Chat">
      <input id="chatInput" type="text" maxlength="100" placeholder="Say something (max 100)" aria-label="Chat message" />
      <button id="chatSendBtn" type="button">Send</button>
    </div>

    <div id="menuModal" class="menu-modal hidden" role="dialog" aria-label="Game menu">
      <button id="menuSettingsBtn" type="button" class="menu-item">Settings</button>
      <button id="menuExitBtn" type="button" class="menu-item">Exit World</button>
      <button id="menuLogoutBtn" type="button" class="menu-item danger">Logout</button>
    </div>

    <div id="settingsModal" class="settings-modal hidden" role="dialog" aria-label="Settings">
      <h2>Settings</h2>
      <label for="graphicsScale">Graphics Quality</label>
      <select id="graphicsScale">
        <option value="0.55">Low</option>
        <option value="0.7" selected>Medium</option>
        <option value="0.85">High</option>
      </select>

      <label class="setting-toggle"><input id="toggleReachRing" type="checkbox" checked /> Show reach ring</label>
      <label class="setting-toggle"><input id="toggleClouds" type="checkbox" checked /> Show sky clouds</label>

      <button id="settingsCloseBtn" type="button" class="menu-item">Close</button>
    </div>

    <canvas id="game" aria-label="Agetopia game canvas"></canvas>
    
    <!-- Mobile Controls -->
    <div id="mobileControls" class="mobile-controls">
      <div class="movement-pad-left">
        <button id="btnLeft" class="arrow-btn left" aria-label="Move left">◄</button>
        <button id="btnRight" class="arrow-btn right" aria-label="Move right">►</button>
      </div>
      <button id="btnJump" class="action-btn jump" aria-label="Jump">⬆</button>
    </div>
    
    <!-- Bottom Inventory Bar -->
    <div class="inventory-bar">
      <button id="inventoryExpandBtn" class="inventory-expand-btn" aria-label="Open full inventory">⋮⋮</button>
      <div class="quick-inventory">
        <button id="btnPunch" class="punch-slot" aria-label="Punch">👊</button>
        <div id="quickSlots" class="quick-slots"></div>
      </div>
      <div id="gemCounter" class="gem-counter">
        <img src="assets/items/gem.svg" alt="Gem" class="gem-icon">
        <span id="gemCount" class="gem-count">0</span>
      </div>
    </div>
    
    <footer class="hud-bottom">
      <div id="status">Loading...</div>
    </footer>

    <div id="inventoryModal" class="inventory-modal hidden" role="dialog" aria-label="Full Inventory">
      <h3>Full Inventory</h3>
      <div id="inventory" class="inventory"></div>
      <div class="inventory-actions">
        <button id="dropBtn" type="button" class="menu-item secondary">Drop</button>
        <button id="inventoryCloseBtn" type="button" class="menu-item">Close</button>
      </div>
    </div>

    <div id="dropModal" class="inventory-modal hidden" role="dialog" aria-label="Drop Items">
      <h3>Drop Items</h3>
      <p id="dropItemLabel">Select an item to drop.</p>
      <input id="dropAmountInput" type="number" min="1" step="1" value="1" aria-label="Amount to drop" />
      <div class="inventory-actions">
        <button id="dropConfirmBtn" type="button" class="menu-item secondary">Confirm</button>
        <button id="dropCancelBtn" type="button" class="menu-item">Cancel</button>
      </div>
    </div>

    <!-- Friends Chat -->
    <button id="friendsChatToggle" class="friends-chat-toggle" type="button" aria-label="Friends chat">Friends Chat</button>
    <div id="friendsChatPanel" class="friends-chat-panel hidden" role="dialog" aria-label="Friends chat">
      <div class="friends-chat-header">
        <span>Friends</span>
        <button id="friendsChatClose" class="friends-chat-close" type="button" aria-label="Close friends chat">×</button>
      </div>
      <div class="friends-chat-search">
        <input id="friendSearchInput" type="text" placeholder="Search players" aria-label="Search players" maxlength="24" />
        <button id="friendSearchBtn" type="button">Search</button>
      </div>
      <div id="friendSearchResults" class="friend-search-results"></div>
      <div class="friends-chat-body">
        <div class="friends-list" id="friendsList" aria-label="Friends list"></div>
        <div class="friends-conversation">
          <div id="friendsConversationHeader" class="friends-conversation-header">Select a friend to chat</div>
          <div id="friendsMessages" class="friends-messages" role="log" aria-live="polite"></div>
          <div class="friends-message-input">
            <input id="friendsMessageInput" type="text" placeholder="Type a message" aria-label="Friend message" maxlength="200" />
            <button id="friendsMessageSend" type="button">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
