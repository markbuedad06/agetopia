<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Diamond shape gem in blue -->
  <!-- Top point -->
  <polygon points="16,2 22,12 10,12" fill="#3b82f6"/>
  <!-- Upper middle -->
  <polygon points="10,12 16,22 22,12" fill="#1e40af"/>
  <!-- Bottom left facet -->
  <polygon points="10,12 6,20 12,16" fill="#60a5fa"/>
  <!-- Bottom right facet -->
  <polygon points="22,12 26,20 20,16" fill="#60a5fa"/>
  <!-- Bottom point -->
  <polygon points="12,16 16,28 20,16 16,22" fill="#0c4a6e"/>
  <!-- Highlight/shine on top -->
  <polygon points="16,4 17,10 15,10" fill="#93c5fd" opacity="0.9"/>
  <!-- Reflection -->
  <line x1="14" y1="14" x2="18" y2="18" stroke="#bfdbfe" stroke-width="1" opacity="0.7"/>
</svg>