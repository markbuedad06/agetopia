<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Block background -->
  <rect x="0" y="0" width="32" height="32" fill="#FFD700"/>
  
  <!-- Lock body (darker golden) -->
  <rect x="7" y="12" width="18" height="16" rx="2" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
  
  <!-- Lock shackle (golden arch) -->
  <path d="M 11 12 Q 11 4 16 4 Q 21 4 21 12" fill="none" stroke="#DAA520" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Key slot (circular) -->
  <circle cx="16" cy="17" r="2.5" fill="#B8860B"/>
  <rect x="15" y="20" width="2" height="4" fill="#B8860B"/>
  
  <!-- Highlight/shine for 3D effect -->
  <rect x="9" y="14" width="3" height="3" fill="#FFED4E" opacity="0.7" rx="1"/>
  
  <!-- Shadow at bottom -->
  <rect x="7" y="26" width="18" height="2" fill="#B8860B" opacity="0.3" rx="1"/>
</svg>
