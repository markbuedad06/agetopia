<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agetopia Worlds</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-label="World selection">
      <h1>World Hub</h1>
      <p class="login-subtitle">Search for a world or create one instantly.</p>

      <div class="world-search">
        <input id="worldName" type="text" placeholder="enter a world name" maxlength="24" />
        <button id="createOrFindBtn" type="button">Create / Find</button>
      </div>
      <p class="helper-text">Press Enter to search or create. Selecting a card joins that world.</p>

      <div id="worldList" class="world-list cards"></div>

      <div class="login-actions">
        <button id="playDefaultBtn" type="button">Play Default</button>
        <button id="logoutBtn" type="button" class="secondary">Logout</button>
      </div>

      <p id="worldMessage" class="auth-message" role="status">Loading worlds...</p>
    </section>
  </main>

  <script>
    const TOKEN_KEY = "agetopia_token";
    const LAST_WORLD_KEY = "agetopia_world";

    const worldNameEl = document.getElementById("worldName");
    const createOrFindBtn = document.getElementById("createOrFindBtn");
    const worldListEl = document.getElementById("worldList");
    const playDefaultBtn = document.getElementById("playDefaultBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const worldMessageEl = document.getElementById("worldMessage");

    function setMessage(text) {
      worldMessageEl.textContent = text;
    }

    function normalizeWorldName(raw) {
      const safe = String(raw || "").trim().toLowerCase().replace(/[^a-z0-9_-]/g, "");
      return safe.slice(0, 24);
    }

    function joinWorld(worldName) {
      const clean = normalizeWorldName(worldName) || "default";
      localStorage.setItem(LAST_WORLD_KEY, clean);
      window.location.href = `index.html?online=1&world=${encodeURIComponent(clean)}`;
    }

    function requireSession() {
      const token = localStorage.getItem(TOKEN_KEY) || "";
      if (!token) {
        window.location.href = "login.html";
      }
    }

    function renderWorlds(worlds) {
      if (!Array.isArray(worlds) || worlds.length === 0) {
        worldListEl.innerHTML = "<p class=\"world-empty\">No worlds found. Create one to get started.</p>";
        return;
      }

      worldListEl.innerHTML = "";
      worlds.forEach((world) => {
        const hasOwner = Boolean(world.ownerName);
        const icon = hasOwner ? "🔒" : "🔓";
        const ownerLabel = hasOwner ? `Owner: ${world.ownerName}` : "Unclaimed";

        const card = document.createElement("button");
        card.type = "button";
        card.className = "world-card";
        card.innerHTML = `
          <div class="world-card__title">${icon} ${world.worldName}</div>
          <div class="world-card__meta">${ownerLabel}</div>
        `;
        card.addEventListener("click", () => joinWorld(world.worldName));
        worldListEl.appendChild(card);
      });
    }

    async function fetchWorlds(searchTerm = "") {
      const token = localStorage.getItem(TOKEN_KEY) || "";
      const resp = await fetch(`/api/worlds?search=${encodeURIComponent(searchTerm)}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (resp.status === 401) {
        window.location.href = "login.html";
        return [];
      }

      if (!resp.ok) {
        throw new Error("Failed to load worlds");
      }

      const data = await resp.json();
      return data.worlds || [];
    }

    async function loadWorlds(searchTerm = "") {
      try {
        setMessage(searchTerm ? `Searching for "${searchTerm}"...` : "Loading worlds...");
        const worlds = await fetchWorlds(searchTerm);
        renderWorlds(worlds);
        setMessage(
          searchTerm
            ? worlds.length
              ? `Showing results for "${searchTerm}"`
              : `No worlds match "${searchTerm}". Create it!`
            : "Choose a world to enter."
        );
      } catch (err) {
        console.error(err);
        setMessage("Could not load worlds. Try again.");
      }
    }

    function handleCreateOrFind() {
      const world = normalizeWorldName(worldNameEl.value);
      if (!world) {
        setMessage("Enter a world name to create or find.");
        return;
      }
      setMessage(`Joining ${world}...`);
      joinWorld(world);
    }

    createOrFindBtn.addEventListener("click", handleCreateOrFind);
    worldNameEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleCreateOrFind();
      }
    });

    playDefaultBtn.addEventListener("click", () => joinWorld("default"));

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = "login.html";
    });

    requireSession();
    loadWorlds();
  </script>
</body>
</html>
