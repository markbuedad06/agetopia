<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agetopia Worlds</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-label="World selection">
      <h1>World Hub</h1>
      <p class="login-subtitle">Claimed worlds you can join.</p>

      <div class="world-actions">
        <input id="searchWorldName" type="text" placeholder="enter a world name" maxlength="24" aria-label="World name" />
        <button id="searchWorldBtn" type="button">Create / Find</button>
      </div>

      <div id="worldList" class="world-list world-grid"></div>

      <div class="login-actions">
        <button id="playDefaultBtn" type="button">Play Default</button>
        <button id="logoutBtn" type="button" class="secondary">Logout</button>
      </div>

      <p id="worldMessage" class="auth-message" role="status">Choose a world to enter.</p>
    </section>
  </main>

  <script>
    const TOKEN_KEY = "agetopia_token";
    const LAST_WORLD_KEY = "agetopia_world";
    const worldListEl = document.getElementById("worldList");
    const playDefaultBtn = document.getElementById("playDefaultBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const worldMessageEl = document.getElementById("worldMessage");
    const searchWorldNameEl = document.getElementById("searchWorldName");
    const searchWorldBtn = document.getElementById("searchWorldBtn");
    let claimedWorlds = [];

    function authHeader() {
      const token = localStorage.getItem(TOKEN_KEY) || "";
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    function setMessage(text) {
      worldMessageEl.textContent = text;
    }

    function normalizeWorldName(raw) {
      const safe = String(raw || "").trim().toLowerCase().replace(/[^a-z0-9_-]/g, "");
      return safe.slice(0, 24);
    }

    function joinWorld(worldName) {
      const clean = normalizeWorldName(worldName) || "default";
      localStorage.setItem(LAST_WORLD_KEY, clean);
      window.location.href = `index.html?online=1&world=${encodeURIComponent(clean)}`;
    }

    function requireSession() {
      const token = localStorage.getItem(TOKEN_KEY) || "";
      if (!token) {
        window.location.href = "login.html";
      }
    }

    playDefaultBtn.addEventListener("click", () => joinWorld("default"));

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = "login.html";
    });

    async function fetchClaimedWorlds() {
      try {
        setMessage("Loading worlds...");
        const res = await fetch("/api/worlds", { headers: { ...authHeader() } });
        if (!res.ok) {
          setMessage("Failed to load worlds.");
          return [];
        }
        const data = await res.json();
        return Array.isArray(data.worlds) ? data.worlds : [];
      } catch (err) {
        console.error("Error loading worlds", err);
        setMessage("Could not reach server.");
        return [];
      }
    }

    function renderClaimedWorlds(worlds) {
      if (!worlds || worlds.length === 0) {
        worldListEl.innerHTML = "<p class=\"world-empty\">No claimed worlds yet.</p>";
        return;
      }

      worldListEl.innerHTML = "";
      worlds.forEach((w) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "world-card";
        card.setAttribute("aria-label", `World ${w.worldName}, owner ${w.ownerName}, ${w.playerCount} online`);

        const titleRow = document.createElement("div");
        titleRow.className = "world-card__title";
        titleRow.textContent = `🔒 ${w.worldName || "unknown"}`;

        const meta = document.createElement("div");
        meta.className = "world-card__meta";
        meta.textContent = `Owner: ${w.ownerName || "Unknown"}`;

        const players = document.createElement("div");
        players.className = "world-card__pill";
        players.textContent = `${w.playerCount || 0} inside`;

        card.appendChild(titleRow);
        card.appendChild(meta);
        card.appendChild(players);

        card.addEventListener("click", () => joinWorld(w.worldName));
        worldListEl.appendChild(card);
      });
    }

    function filterAndRender(query) {
      const q = String(query || "").trim().toLowerCase();
      const filtered = q
        ? claimedWorlds.filter((w) => String(w.worldName || "").toLowerCase().includes(q))
        : claimedWorlds;
      renderClaimedWorlds(filtered);
      setMessage(filtered.length ? "Choose a world to enter." : q ? "No matches found." : "No claimed worlds yet.");
    }

    function handleSearchJoin() {
      const world = normalizeWorldName(searchWorldNameEl.value);
      if (!world) {
        setMessage("Enter a world name first.");
        return;
      }
      setMessage(`Joining ${world}...`);
      joinWorld(world);
    }

    async function init() {
      requireSession();
      claimedWorlds = await fetchClaimedWorlds();
      filterAndRender(searchWorldNameEl.value);
    }

    requireSession();
    init();

    searchWorldBtn.addEventListener("click", handleSearchJoin);
    searchWorldNameEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleSearchJoin();
      }
    });
    searchWorldNameEl.addEventListener("input", () => filterAndRender(searchWorldNameEl.value));
  </script>
</body>
</html>
